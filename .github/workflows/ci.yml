name: Re-Fit Frontend CI

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '.github/workflows/**'
  push:
    branches: [develop, main]
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      job_to_run:
        description: 'Which job to run'
        required: true
        type: choice
        options:
          - lint-and-test
          - e2e
          - integration
          - release-dev
          - release-prod
          - all
      e2e_scope:
        description: 'E2E scope when job_to_run is e2e/all'
        required: false
        type: choice
        default: smoke
        options:
          - smoke
          - full

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10

jobs:
  # 1. PR 검증 단계
  lint-and-test:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'lint-and-test' || github.event.inputs.job_to_run == 'all'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run Lint
        run: pnpm run lint

      - name: TypeScript Type Check
        run: pnpm run type-check

      - name: Setup Build Environment
        run: echo "${{ secrets.TEST_ENV_FILE }}" > .env.production

      - name: Build Check
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Run Unit Tests
        run: pnpm test || echo "⚠️  No tests defined yet"

  # 1-2. E2E 검증 단계 (Playwright)
  e2e:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'e2e' || github.event.inputs.job_to_run == 'all'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Decide E2E Scope
        id: e2e-scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "scope=smoke" >> "$GITHUB_OUTPUT"
            echo "command=pnpm run test:e2e:smoke" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            echo "scope=full" >> "$GITHUB_OUTPUT"
            echo "command=pnpm run test:e2e" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.inputs.e2e_scope }}" = "full" ]; then
            echo "scope=full" >> "$GITHUB_OUTPUT"
            echo "command=pnpm run test:e2e" >> "$GITHUB_OUTPUT"
          else
            echo "scope=smoke" >> "$GITHUB_OUTPUT"
            echo "command=pnpm run test:e2e:smoke" >> "$GITHUB_OUTPUT"
          fi

      - name: Run E2E Tests
        run: ${{ steps.e2e-scope.outputs.command }}
        env:
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ steps.e2e-scope.outputs.scope }}-${{ github.run_id }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ steps.e2e-scope.outputs.scope }}-${{ github.run_id }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

  # 2. 통합 검증 단계
  integration:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'integration' || github.event.inputs.job_to_run == 'all'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Integration Test
        run: pnpm run test:integration || echo "⚠️  Integration tests not yet implemented"

      - name: Security Scan
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  # 3. 개발 환경 릴리즈 (develop 브랜치 - Docker 기반)
  release-dev:
    needs: [integration]
    if: |
      always() &&
      needs.integration.result != 'failure' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'release-dev' || github.event.inputs.job_to_run == 'all'))
      )
    runs-on: ubuntu-24.04-arm
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Image Metadata
        id: meta
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          IMAGE_TAG="develop-${SHA_SHORT}"
          FULL_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_FRONTEND }}:${IMAGE_TAG}"
          LATEST_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_FRONTEND }}:develop-latest"

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "latest_image=${LATEST_IMAGE}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "🐳 Docker Image: ${FULL_IMAGE}"

      - name: Setup Environment Variables
        run: |
          echo "${{ secrets.DEV_ENV_FILE }}" > .env.production
          echo "✅ .env.production created from DEV_ENV_FILE"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.full_image }}
            ${{ steps.meta.outputs.latest_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64

      - name: Trigger CD-Dev Workflow
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd-dev.yml',
              ref: 'develop',
              inputs: {
                image_tag: '${{ steps.meta.outputs.image_tag }}',
                sha: '${{ github.sha }}',
                run_id: '${{ github.run_id }}'
              }
            });
            console.log('✅ CD-Dev workflow triggered successfully');

  # 4. 프로덕션 릴리즈 (main 브랜치 - SST 기반)
  release-prod:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_to_run == 'release-prod' || github.event.inputs.job_to_run == 'all'))
    runs-on: ubuntu-24.04-arm
    outputs:
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Determine Version and Artifact Names
        id: version
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          VERSION=$(node -p "require('./package.json').version")
          VERSION_TAG="v${VERSION}"
          ARTIFACT_PREFIX="v${VERSION}-${SHA_SHORT}"

          echo "📦 Production Release: ${VERSION_TAG} (${SHA_SHORT})"
          echo "version_tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "artifact_prefix=${ARTIFACT_PREFIX}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Full Regression Test
        run: pnpm run test:all || echo "⚠️  Full tests not yet implemented"

      - name: Setup Environment Variables
        run: echo "${{ secrets.PROD_V2_ENV_FILE }}" > .env.production

      - name: Production Build
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Verify Build Output
        run: |
          echo "Current directory: $(pwd)"
          if [ -d ".next" ]; then
            echo "✅ .next directory exists"
            ls -la .next/
            echo "Absolute path: $(pwd)/.next"
          else
            echo "❌ .next directory not found"
            exit 1
          fi

      - name: Create Release Tag
        run: |
          TAG_NAME="${{ steps.version.outputs.version_tag }}"

          # 태그가 이미 존재하는지 확인
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "⚠️  Tag $TAG_NAME already exists. Skipping tag creation."
            echo "   Please bump the version in package.json before releasing."
            exit 1
          fi

          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "✅ Created and pushed tag: $TAG_NAME"

      - name: Trigger CD-Prod-V2 Workflow
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cd-prod-v2.yml',
              ref: 'main',
              inputs: {
                sha: '${{ github.sha }}',
                version_tag: '${{ steps.version.outputs.version_tag }}',
                stage: 'prod'
              }
            });
            console.log('✅ CD-Prod-V2 (SST) workflow triggered successfully');
